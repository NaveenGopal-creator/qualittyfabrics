<style>
.gallery-main { padding: 60px 5% 90px; }
.filter-bar { display:flex; gap:.75rem; flex-wrap:wrap; margin:2rem 0 2.5rem; }
.filter-btn { padding:.5rem 1.2rem; background:transparent; border:1px solid rgba(255,255,255,.2); color:var(--white-dim); font-family:var(--font-body); font-size:.78rem; font-weight:500; letter-spacing:.08em; text-transform:uppercase; border-radius:2px; cursor:pointer; transition:all .2s; }
.filter-btn:hover,.filter-btn.active { background:var(--gold); border-color:var(--gold); color:var(--navy); }
.gallery-grid { columns:4; column-gap:.8rem; }
.gallery-item { break-inside:avoid; margin-bottom:.8rem; border-radius:6px; overflow:hidden; position:relative; cursor:pointer; display:block; }
.gallery-item img { width:100%; display:block; transition:transform .4s; border-radius:6px; }
.gallery-item:hover img { transform:scale(1.04); }
.gallery-overlay { position:absolute; inset:0; background:rgba(10,22,40,.55); opacity:0; transition:opacity .3s; display:flex; align-items:center; justify-content:center; border-radius:6px; }
.gallery-overlay i { color:var(--white); font-size:1.8rem; }
.gallery-item:hover .gallery-overlay { opacity:1; }
.gallery-item.hidden { display:none; }

/* Lightbox */
.lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,.94); z-index:9999; align-items:center; justify-content:center; flex-direction:column; gap:1rem; }
.lightbox.open { display:flex; }
.lightbox-img-wrap { position:relative; max-width:90vw; max-height:85vh; }
.lightbox-img-wrap img { max-width:90vw; max-height:85vh; object-fit:contain; border-radius:4px; display:block; }
.lightbox-close { position:absolute; top:1rem; right:1.5rem; color:#fff; font-size:2rem; cursor:pointer; background:none; border:none; line-height:1; z-index:10; }
.lightbox-nav { display:flex; gap:1rem; }
.lightbox-nav button { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; padding:.5rem 1.2rem; border-radius:4px; cursor:pointer; font-size:.85rem; transition:background .2s; }
.lightbox-nav button:hover { background:var(--gold); color:var(--navy); border-color:var(--gold); }
.lightbox-counter { color:rgba(255,255,255,.5); font-size:.8rem; }

@media(max-width:1024px){ .gallery-grid { columns:3; } }
@media(max-width:640px){ .gallery-grid { columns:2; } }
</style>
</head>

  <div class="filter-bar reveal" style="transition-delay:.1s">
    <button class="filter-btn active" onclick="filterGallery('all',this)"><i class="fa-solid fa-border-all"></i> All</button>
    <button class="filter-btn" onclick="filterGallery('loom',this)"><i class="fa-solid fa-industry"></i> Loom</button>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <div class="lightbox-img-wrap">
    <img id="lightboxImg" src="" alt="">
  </div>
  <div class="lightbox-nav">
    <button onclick="navLightbox(-1)"><i class="fa-solid fa-arrow-left"></i> Prev</button>
    <span class="lightbox-counter" id="lightboxCounter"></span>
    <button onclick="navLightbox(1)">Next <i class="fa-solid fa-arrow-right"></i></button>

<script>
const BASE = 'https://www.qualittyfabrics.in/u/1541541623923348/m/25gbg0f/';
const FULL = 'https://www.qualittyfabrics.in/u/1541541623923348/m/25gbg0f/';

// All gallery images from original website with categories
const GALLERY = [
  { file:'qualitty-fabrics-manufacturers-in-perundurai-erode-tamilnadu-g10048.webp', cat:'loom',    alt:'Qualitty Fabrics Loom Unit' },

  { file:'quality-fabrics-manufacturers-in-perundurai-erode-g10039.webp', cat:'quality', alt:'Quality Testing' },
  { file:'qualitty-fabrics-manufacturers-in-perundurai-g10038.webp', cat:'loom',    alt:'Loom Detail' },
  { file:'quality-fabrics-manufacturers-in-perundurai-g10033.webp', cat:'lab',     alt:'Lab Testing' },
  { file:'qualitty-fabrics-manufacturers-in-perundurai-erode-tamilnadu-india-g10032.webp', cat:'others', alt:'Infrastructure' },
  { file:'qualitty-fabrics-manufacturers-in-perundurai-erode-g10031.webp', cat:'loom', alt:'Weaving Unit' },
  { file:'quality-fabrics-manufacturers-in-perundurai-erode-tamilnadu-india-g10029.webp', cat:'others', alt:'Fabric Production' },
  { file:'qualitty-fabrics-manufacturers-in-perundurai-erode-tamilnadu-g10028.webp', cat:'loom', alt:'Loom Operation' },
  { file:'quality-fabrics-manufacturers-in-perundurai-erode-g10027.webp', cat:'quality', alt:'Fabric Inspection' },

  { file:'qualitty-fabrics-manufacturers-in-perundurai-erode-tamilnadu-india-g10020.webp', cat:'others', alt:'Factory Overview' },

  { file:'quality-fabrics-manufacturers-in-perundurai-erode-tamilnadu-g10014.webp', cat:'lab',  alt:'Lab Analysis' },
  { file:'quality-fabrics-manufacturers-in-perundurai-erode-g10013.webp', cat:'quality', alt:'QC Process' },
  { file:'quality-fabrics-manufacturers-in-perundurai-g10012.webp', cat:'lab',    alt:'Testing Lab' },
  { file:'qualitty-fabrics-manufacturers-in-perundurai-erode-tamilnadu-g10011.webp', cat:'loom', alt:'Weaving Floor' },
  { file:'quality-fabrics-manufacturers-in-perundurai-g10010.webp', cat:'quality', alt:'Inspection' },

  { file:'qualitty-fabrics-manufacturers-in-perundurai-erode-g10007.webp', cat:'others', alt:'Company Premises' },

  { file:'quality-fabrics-manufacturers-in-perundurai-erode-g10005.webp', cat:'lab',  alt:'Lab Testing Room' },
  { file:'quality-fabrics-manufacturers-in-perundurai-erode-tamilnadu-g10004.webp', cat:'quality', alt:'Quality Monitoring' },
  { file:'qualitty-fabrics-manufacturers-in-perundurai-erode-tamilnadu-india-g10003.webp', cat:'others', alt:'Facility View' },
];

let currentIdx = 0;
let visibleImages = [];

function buildGallery(cat) {
  const grid = document.getElementById('galleryGrid');
  grid.innerHTML = '';
  visibleImages = cat === 'all' ? [...GALLERY] : GALLERY.filter(g => g.cat === cat);
  visibleImages.forEach((img, i) => {
    const div = document.createElement('div');
    div.className = 'gallery-item';
    div.innerHTML = `<img src="${BASE}${img.file}" alt="${img.alt}" loading="lazy" onerror="this.parentElement.style.display='none'"><div class="gallery-overlay"><i class="fa-solid fa-magnifying-glass-plus"></i></div>`;
    div.addEventListener('click', () => openLightbox(i));
    grid.appendChild(div);
  });
}

function filterGallery(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildGallery(cat);
}

function openLightbox(idx) {
  currentIdx = idx;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function navLightbox(dir) {
  currentIdx = (currentIdx + dir + visibleImages.length) % visibleImages.length;
  updateLightbox();
}
function updateLightbox() {
  const img = visibleImages[currentIdx];
  document.getElementById('lightboxImg').src = FULL + img.file;
  document.getElementById('lightboxCounter').textContent = `${currentIdx + 1} / ${visibleImages.length}`;
}
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowRight') navLightbox(1);
  if (e.key === 'ArrowLeft') navLightbox(-1);
});

buildGallery('all');
initPage('Gallery');
</script>
</body>
</html>
